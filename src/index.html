<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>Employee Management Backoffice</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <!-- Font Awesome for sleek icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>

<body>
  <app-root>
    <div
      style="display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #0f172a; color: #f8fafc; font-family: sans-serif; flex-direction: column; gap: 20px;">
      <div
        style="width: 50px; height: 50px; border: 4px solid rgba(255, 255, 255, 0.1); border-top-color: #3b82f6; border-radius: 50%; animation: spin 1s linear infinite;">
      </div>
      <div style="font-size: 18px; font-weight: 600; letter-spacing: 0.05em;">LOADING BACKOFFICE...</div>
    </div>
    <style>
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </app-root>
</body>

</html>
