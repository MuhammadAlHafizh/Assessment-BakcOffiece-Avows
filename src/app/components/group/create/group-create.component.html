<div class="app-container">
  <app-header></app-header>

  <main class="main-content !max-w-screen-2xl">
    <div class="flex flex-col gap-1 mb-6">
      <h1 class="page-title">Add Group</h1>
      <app-breadcrumb [items]="breadcrumbs"></app-breadcrumb>
    </div>

    <form [formGroup]="addForm" (ngSubmit)="onSubmit()">
      <div class="glass-panel mb-6">
        
        <div class="form-group">
          <label class="form-label text-[#0a354a] dark:text-slate-300 font-semibold" for="name">Group Name *</label>
          <input type="text" id="name" formControlName="name"
            class="w-full px-3 py-2 border border-[#d1d5db] dark:border-slate-700 rounded-md text-sm bg-white dark:bg-slate-900 text-slate-800 dark:text-slate-100 outline-none focus:border-[#0091cb] focus:ring-1 focus:ring-[#0091cb] transition-all"
            [ngClass]="{ 'border-red-500': submitted && f['name'].errors }"
            placeholder="Enter group name" />
          <div *ngIf="submitted && f['name'].errors" class="text-red-400 text-xs mt-1">
            <span *ngIf="f['name'].errors['required']">Group name is mandatory.</span>
          </div>
        </div>
      </div>

      <div class="flex gap-4 w-full md:w-auto justify-start mt-6">
        <app-button variant="outline" customClass="flex-1 md:flex-initial md:w-32 justify-center text-center font-bold" (btnClick)="onCancel()">
          Cancel
        </app-button>
        <app-button variant="solid" type="submit" customClass="flex-1 md:flex-initial md:w-32 justify-center text-center font-bold">
          Save
        </app-button>
      </div>
    </form>
  </main>

  <footer class="app-footer text-center">
    <span>2026 &copy;hafizh</span>
  </footer>
</div>
