<div class="app-container">

  <app-header></app-header>

  <main class="main-content !max-w-screen-2xl">

    <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3 mb-5">
      <div class="flex flex-col gap-1">
        <h1 class="page-title">Master Group</h1>
        <app-breadcrumb [items]="breadcrumbs"></app-breadcrumb>
      </div>

      <div class="relative w-full sm:w-72">
        <input type="text" class="form-control pl-9" [(ngModel)]="searchKeyword" (ngModelChange)="onSearchChange()"
          placeholder="Search on Group" />
        <i class="fa fa-search absolute left-3 top-1/2 -translate-y-1/2 text-slate-500 text-sm"></i>
      </div>
    </div>

    <div class="glass-panel !p-3 mb-4 !rounded">

      <div class="hidden lg:flex items-center justify-between gap-3 flex-wrap">

        <div class="flex items-center gap-3 flex-wrap">
          <app-button (btnClick)="router.navigate(['/groups/create'])" variant="solid"
            customClass="h-9 px-4 text-xs !bg-brand">
            <i class="fa fa-plus"></i> New Group
          </app-button>
          <app-button (btnClick)="resetFilters()" variant="outline"
            customClass="h-9 px-4 text-xs border border-brand text-brand">
            <i class="fa fa-refresh"></i> Reset
          </app-button>
          <div class="flex items-center gap-2">
            <span class="text-xs font-medium text-slate-400 whitespace-nowrap">View Status</span>
            <select [(ngModel)]="statusFilter" (ngModelChange)="onFilterClickChange()"
              class="form-control h-9 w-28 text-xs !px-2 !py-1">
              <option value="">All</option>
              <option value="Active">Active</option>
              <option value="Inactive">Inactive</option>
            </select>
          </div>
        </div>

        <div class="flex items-center gap-4">
          <div class="flex items-center gap-2">
            <span class="text-xs font-medium text-slate-400 whitespace-nowrap">Change Status to</span>
            <select [(ngModel)]="bulkStatusTarget" class="form-control h-9 w-28 text-xs !px-2 !py-1">
              <option value="Active">Active</option>
              <option value="Inactive">Inactive</option>
            </select>
            <app-button (btnClick)="applyBulkStatusChange()" variant="outline"
              customClass="h-9 px-3 text-xs border border-brand text-brand">
              Go
            </app-button>
          </div>
          <div class="flex items-center gap-1.5">
            <span class="text-xs font-medium text-slate-400 whitespace-nowrap">Show</span>
            <select [ngModel]="pageSize" (ngModelChange)="onPageSizeChange($event)"
              class="form-control h-9 w-16 text-xs !px-1.5 !py-1">
              <option [value]="10">10</option>
              <option [value]="25">25</option>
              <option [value]="50">50</option>
              <option [value]="100">100</option>
            </select>
            <span class="text-xs font-medium text-slate-400 whitespace-nowrap">entries</span>
          </div>
          <app-page-switcher [page]="page" [totalPages]="totalPages" [pagesArray]="pagesArray"
            (pageChange)="onPageChange($event)"></app-page-switcher>
        </div>
      </div>

      <div class="flex flex-col gap-3 lg:hidden">

        <div class="flex flex-col sm:flex-row gap-2">
          <app-button (btnClick)="router.navigate(['/groups/create'])" variant="solid"
            customClass="w-full h-10 justify-center text-sm !bg-brand">
            <i class="fa fa-plus"></i> New Group
          </app-button>
          <app-button (btnClick)="resetFilters()" variant="outline"
            customClass="w-full h-10 justify-center text-sm border border-brand text-brand">
            <i class="fa fa-refresh"></i> Reset
          </app-button>
        </div>

        <div class="flex flex-col gap-1">
          <span class="text-xs font-medium text-slate-400">View Status</span>
          <select [(ngModel)]="statusFilter" (ngModelChange)="onFilterClickChange()"
            class="form-control h-10 w-full text-sm">
            <option value="">All</option>
            <option value="Active">Active</option>
            <option value="Inactive">Inactive</option>
          </select>
        </div>

        <div class="flex flex-col gap-1">
          <span class="text-xs font-medium text-slate-400">Change Status to</span>
          <div class="flex gap-2">
            <select [(ngModel)]="bulkStatusTarget" class="form-control h-10 flex-1 text-sm">
              <option value="Active">Active</option>
              <option value="Inactive">Inactive</option>
            </select>
            <app-button (btnClick)="applyBulkStatusChange()" variant="outline"
              customClass="h-10 px-6 text-sm border border-brand text-brand flex-shrink-0">
              Go
            </app-button>
          </div>
        </div>

        <div class="flex flex-col gap-1">
          <span class="text-xs font-medium text-slate-400">Show Entries</span>
          <select [ngModel]="pageSize" (ngModelChange)="onPageSizeChange($event)"
            class="form-control h-10 w-full text-sm">
            <option [value]="10">10 entries</option>
            <option [value]="25">25 entries</option>
            <option [value]="50">50 entries</option>
            <option [value]="100">100 entries</option>
          </select>
        </div>
      </div>

    </div>

    <div class="glass-panel !p-0 overflow-hidden !rounded relative">

      <div *ngIf="isLoading"
        class="absolute inset-x-0 bottom-0 flex flex-col items-center justify-center z-10 bg-white/70 dark:bg-slate-950/65"
        style="top: 88px; backdrop-filter: blur(4px);">
        <div class="w-8 h-8 border-2 border-brand border-t-transparent rounded-full animate-spin"></div>
        <div class="mt-3 text-sm font-medium text-slate-600 dark:text-slate-300">Fetching Data...</div>
      </div>

      <div class="overflow-x-auto" [ngClass]="{ 'opacity-40 pointer-events-none': isLoading }">
        <table class="w-full border-collapse" style="min-width: 480px;">
          <thead>
            <tr class="bg-slate-100/60 dark:bg-white/[0.02] border-b border-slate-200 dark:border-white/[0.06]">
              <th class="px-3 py-3 text-center w-10">
                <input type="checkbox" [checked]="masterSelected" (change)="toggleSelectAll()"
                  class="w-4 h-4 cursor-pointer accent-brand" title="Select all" />
              </th>
              <th
                class="px-3 py-3 text-left text-xs font-bold uppercase tracking-wider text-slate-800 dark:text-slate-400 w-24">
                ACTION
              </th>
              <th
                class="px-3 py-3 text-left text-xs font-bold uppercase tracking-wider text-slate-800 dark:text-slate-400 cursor-pointer hover:text-blue-500 dark:hover:text-blue-400 transition-colors"
                (click)="onSort('name')">
                GROUP NAME <span *ngIf="sortBy === 'name'" class="ml-1">{{ sortDesc ? '▼' : '▲' }}</span>
              </th>
              <th
                class="px-3 py-3 text-left text-xs font-bold uppercase tracking-wider text-slate-800 dark:text-slate-400 cursor-pointer hover:text-blue-500 dark:hover:text-blue-400 transition-colors"
                (click)="onSort('status')">
                STATUS <span *ngIf="sortBy === 'status'" class="ml-1">{{ sortDesc ? '▼' : '▲' }}</span>
              </th>
            </tr>

            <tr class="bg-slate-50/50 dark:bg-slate-900/10 border-b border-slate-200 dark:border-white/[0.06]">
              <td class="px-3 py-2"></td>
              <td class="px-3 py-2"></td>
              <td class="px-3 py-2">
                <input type="text" [(ngModel)]="filterName" (ngModelChange)="onSearchChange()"
                  placeholder="Search Group Name..."
                  class="w-full px-2 py-1 text-xs border rounded bg-white dark:bg-slate-900 border-slate-300 dark:border-slate-700 text-slate-800 dark:text-slate-100 placeholder-slate-400 dark:placeholder-slate-600 outline-none focus:border-[#0091cb]" />
              </td>
              <td class="px-3 py-2"></td>
            </tr>
          </thead>

          <tbody>
            <tr *ngFor="let g of paginatedGroups"
              class="border-t border-slate-200 dark:border-white/[0.04] hover:bg-blue-500/[0.06] transition-colors cursor-pointer">

              <td class="px-3 py-3 text-center align-middle" (click)="$event.stopPropagation()">
                <input type="checkbox" [(ngModel)]="selectedGroups[g.uuid]" (change)="onGroupSelectChange()"
                  class="w-4 h-4 cursor-pointer accent-brand" />
              </td>

              <td class="px-3 py-3 align-middle" (click)="$event.stopPropagation()">
                <div class="flex gap-3 items-center text-slate-600 dark:text-slate-400">
                  <span class="has-tooltip" data-tooltip="Edit">
                    <i class="fa fa-pencil cursor-pointer text-sm hover:text-blue-500 dark:hover:text-blue-400 transition-colors"
                      (click)="onEdit(g, $event)"></i>
                  </span>
                  <span class="has-tooltip" data-tooltip="Delete">
                    <i class="fa fa-trash-o cursor-pointer text-sm text-red-500 hover:text-red-400 transition-colors"
                      (click)="onDelete(g, $event)"></i>
                  </span>
                  <span class="has-tooltip" data-tooltip="History">
                    <i class="fa fa-clock-o cursor-pointer text-sm text-brand hover:text-blue-500 dark:hover:text-blue-300 transition-colors"
                      (click)="showHistory(g, $event)"></i>
                  </span>
                </div>
              </td>

              <td class="px-3 py-3 align-middle">
                <span
                  class="text-brand font-semibold cursor-pointer hover:text-blue-500 dark:hover:text-blue-300 transition-colors text-sm"
                  (click)="viewDetail(g)">
                  {{ g.name }}
                </span>
              </td>

              <td class="px-3 py-3 align-middle">
                <div class="relative inline-block text-left" (click)="$event.stopPropagation()">
                  <button type="button" (click)="toggleStatusDropdown(g.uuid, $event)"
                    class="badge flex items-center gap-1.5 focus:outline-none transition-all duration-200 border border-transparent active:scale-95 cursor-pointer"
                    [ngClass]="g.status === 'Active' ? 'badge-active' : 'badge-inactive'">
                    {{ g.status }}
                    <i class="fa fa-chevron-down text-[10px]"
                      [ngClass]="g.status === 'Active' ? 'text-emerald-700 dark:text-emerald-300' : 'text-rose-700 dark:text-rose-300'"></i>
                  </button>

                  <div *ngIf="activeStatusDropdownId === g.uuid"
                    class="absolute left-0 mt-1.5 w-28 rounded-md shadow-lg bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 py-1 z-30 animate-in fade-in slide-in-from-top-1 duration-150">
                    <button type="button"
                      (click)="changeSingleStatus(g, g.status === 'Active' ? 'Inactive' : 'Active', $event)"
                      class="w-full text-left px-3 py-1.5 text-xs text-slate-700 dark:text-slate-200 hover:bg-slate-100 dark:hover:bg-slate-700/50 flex items-center gap-1.5 font-medium transition-colors">
                      <span class="w-1.5 h-1.5 rounded-full"
                        [ngClass]="g.status === 'Active' ? 'bg-rose-500' : 'bg-emerald-500'"></span>
                      Set {{ g.status === 'Active' ? 'Inactive' : 'Active' }}
                    </button>
                  </div>
                </div>
              </td>
            </tr>

            <tr *ngIf="paginatedGroups.length === 0">
              <td colspan="4" class="text-center py-10 text-slate-500 dark:text-slate-400 text-sm">
                No groups found matching the filters.
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <app-page-info [page]="page" [pageSize]="pageSize" [totalItems]="filteredGroups.length" [totalPages]="totalPages"
        [pagesArray]="pagesArray" (pageChange)="onPageChange($event)" (pageSizeChange)="onPageSizeChange($event)">
      </app-page-info>
    </div>
  </main>

  <footer class="app-footer text-center">
    <span>2026 &copy;hafizh</span>
  </footer>

  <app-delete-confirm-modal [show]="showDeleteConfirmModal" [itemName]="groupToDelete?.name || ''"
    (confirmed)="confirmDelete()" (cancelled)="closeDeleteConfirmModal()">
  </app-delete-confirm-modal>

  <app-history-modal [show]="showHistoryModal" [title]="(activeHistoryGroup?.name || '') + ' - Audit Trail'"
    [history]="activeHistoryGroup?.history" (closed)="closeHistoryModal()">
  </app-history-modal>

</div>
