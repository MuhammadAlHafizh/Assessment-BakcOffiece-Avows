<div *ngIf="show"
  class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-950/70 backdrop-blur-sm"
  (click)="batal()">
  <div
    class="w-full max-w-sm overflow-hidden rounded-lg shadow-2xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800"
    (click)="$event.stopPropagation()">

    <div class="flex items-center justify-between px-5 py-3.5 bg-amber-500 text-white font-semibold text-sm">
      <span>Delete Confirmation</span>
      <button (click)="batal()"
        class="text-white hover:text-slate-200 transition-colors text-base font-bold leading-none">✕</button>
    </div>

    <div class="p-5">
      <p class="text-sm text-slate-800 dark:text-slate-200">
        Are you sure you want to delete <strong>{{ itemName }}</strong>?
      </p>

      <div class="flex gap-3 justify-end mt-5">
        <button (click)="batal()"
          class="btn-outline px-4 py-1.5 text-xs font-semibold rounded border border-slate-300 dark:border-slate-600 text-slate-700 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors">
          Cancel
        </button>
        <button (click)="konfirmasi()"
          class="px-4 py-1.5 text-xs font-semibold rounded bg-amber-500 hover:bg-amber-600 text-white transition-colors">
          Delete
        </button>
      </div>
    </div>
  </div>
</div>
