<div *ngIf="show"
  class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-950/70 backdrop-blur-sm"
  (click)="tutupModal()">
  <div
    class="w-full max-w-md overflow-hidden rounded-lg shadow-2xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800"
    (click)="$event.stopPropagation()">

    <div class="flex items-center justify-between px-5 py-3.5 bg-[#f0a824] text-white font-semibold text-sm">
      <span>{{ title }}</span>
      <button (click)="tutupModal()"
        class="text-white hover:text-slate-200 transition-colors text-base font-bold leading-none">
        ✕
      </button>
    </div>

    <div class="p-4">
      <table class="w-full border-collapse text-left text-xs bg-white dark:bg-slate-900">
        <thead>
          <tr
            class="bg-slate-50 dark:bg-white/[0.02] text-slate-800 dark:text-slate-300 font-bold border-b border-slate-200 dark:border-slate-700">
            <th class="px-4 py-2 w-24">DATE</th>
            <th class="px-4 py-2 w-16">TIME</th>
            <th class="px-4 py-2">NAME</th>
            <th class="px-4 py-2 w-24">ACTION</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let item of history"
            class="border-b border-slate-100 dark:border-slate-800 hover:bg-slate-50 dark:hover:bg-slate-800/40 text-slate-800 dark:text-slate-200">
            <td class="px-4 py-2.5">{{ item.date }}</td>
            <td class="px-4 py-2.5">{{ item.time }}</td>
            <td class="px-4 py-2.5 text-slate-500 dark:text-slate-400">{{ item.name }}</td>
            <td class="px-4 py-2.5 font-semibold text-brand dark:text-blue-400">{{ item.action }}</td>
          </tr>
          <tr *ngIf="!history || history.length === 0">
            <td colspan="4" class="text-center py-6 text-slate-500 dark:text-slate-400">
              Belum ada data riwayat.
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
